# Minimal Compose fixture that boots the open-source Java Unity Catalog server
# for acceptance/journey integration tests. Reused by `just integration-oss-java`
# and the `integration-oss-java` CI job.
#
# The image is the same one used by the marimo playground (dev/ucp.compose.yaml).
# See https://github.com/unitycatalog/unitycatalog for the upstream project.
#
# Managed tables land under file:///tmp/uc-test, bind-mounted 1:1 host<->container
# so the vended file:// locations are host-writable (the acceptance battery drives
# the Delta staging flow from the host). Create the host dir first — start clean
# for a fresh catalog:  rm -rf /tmp/uc-test && mkdir -p /tmp/uc-test
name: unitycatalog-oss

services:
  unitycatalog:
    image: unitycatalog/unitycatalog:v0.5.0
    hostname: unitycatalog
    container_name: unitycatalog-oss
    ports:
      - "8080:8080"
    volumes:
      # Tracked, minimal config — authorization disabled, managed tables enabled.
      - type: bind
        source: ./uc-oss/server.properties
        target: /home/unitycatalog/etc/conf/server.properties
        read_only: true
      # Managed-table storage root, bind-mounted 1:1 host<->container so the
      # file:///tmp/uc-test locations UC vends during the Delta staging flow
      # resolve unchanged on the host, where the acceptance battery writes the
      # _delta_log + data files and reads them back. Must match
      # `storage-root.tables` in uc-oss/server.properties.
      - type: bind
        source: /tmp/uc-test
        target: /tmp/uc-test
    healthcheck:
      # The server is ready once it answers the catalogs list endpoint.
      # The image ships wget (not curl).
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null http://localhost:8080/api/2.1/unity-catalog/catalogs || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
