# Minimal uc-server config for the conformance battery (`integration_oss_rust`
# CI job and `just conformance-oss-rust`).
#
# Ephemeral in-memory SQLite backend (clean per run) and a local-storage
# allowlist so `file://` managed catalogs/tables/volumes are accepted — the
# server denies `file://` storage by default.
backend:
  engine: sqlite
  path: ":memory:"

# Allow the conformance storage root and its subpaths. Roots are host filesystem
# paths (not file:// URLs) and must exist at startup (they are canonicalized).
# The checks always pass an explicit `storage_root` on catalog create, so no
# metastore-level managed_storage_root is needed.
local_storage:
  allowed-roots:
    - "/tmp/uc-test"
