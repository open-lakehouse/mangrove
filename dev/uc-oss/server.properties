# Minimal Unity Catalog OSS (Java) server config for integration tests.
# Authorization is disabled so journeys can run unauthenticated.
server.env=test
server.authorization=disable

# Enable MANAGED tables (experimental) so managed-table journeys can run.
server.managed-table.enabled=true

# Managed-table storage root as an ABSOLUTE file:// URL bind-mounted 1:1
# host<->container (see uc-oss.compose.yaml). The Delta staging flow vends these
# file:// locations to the client; making them host-visible lets a host-side
# client (the acceptance battery) write the _delta_log + data files and read them
# back. Matches the working local-FS recipe from the blog snippets. Kept in sync
# with the acceptance harness default (file:///tmp/uc-test/).
storage-root.tables=file:///tmp/uc-test
