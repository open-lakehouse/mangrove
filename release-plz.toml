# release-plz configuration — automated, independent per-crate releases.
#
# release-plz (https://release-plz.dev) is the Rust-native release tool (NOT
# Google's release-please). It analyzes conventional commits *per crate* to
# compute semver bumps, regenerates per-crate changelogs, keeps intra-workspace
# dependency version requirements in sync, and publishes to crates.io in
# topological order. See .github/CONTRIBUTING.md for the end-to-end flow.
#
# Crate naming: the published names are provisional `olai-uc-*` (the package
# `name` in each crate's Cargo.toml). The in-workspace dependency *key* stays
# `unitycatalog(-)*` via each dependent's `package =` alias, so no source churn.
#
# Bootstrap note: crates.io OIDC trusted publishing cannot create a name that
# has never been published. Each `olai-uc-*` crate therefore needs a one-time
# token bootstrap (.github/workflows/bootstrap-publish.yml) before release-plz
# can publish it via OIDC. Until a crate has been bootstrapped, it carries
# `release = false` below — release-plz still versions/changelogs/tags it, but
# does not attempt to publish a nonexistent name. Remove the `release = false`
# line (and register its crates.io Trusted Publisher) once it is bootstrapped.
#
# Config reference: https://release-plz.dev/docs/config

[workspace]
# Link PRs/commits in the generated changelog back to the repo.
repo_url = "https://github.com/open-lakehouse/mangrove"

# --- Versioning / changelog ---
changelog_update = true        # regenerate per-crate CHANGELOG.md on each release
dependencies_update = false    # don't `cargo update` during the release PR —
                               # keeps Cargo.lock churn out of release commits
semver_check = true            # run cargo-semver-checks before bumping, to catch
                               # accidental breaking changes in published crates

# --- Git tags & GitHub releases (per-crate) ---
# Per-crate tags, e.g. `olai-uc-cli-v0.0.1`. The cli tag is what the Docker
# release workflow keys off; the prefix keeps each crate's tags distinct.
git_tag_enable = true
git_tag_name = "{{ package }}-v{{ version }}"
git_release_enable = true
git_release_name = "{{ package }} v{{ version }}"
git_release_body = "{{ changelog }}"

# --- Publishing ---
# release-plz runs `cargo publish` itself, in dependency order. With
# `id-token: write` in the workflow it performs crates.io OIDC trusted
# publishing, so NO CARGO_REGISTRY_TOKEN is required.
publish = true
publish_timeout = "30m"        # datafusion/server are slow to verify

# --- Release PR appearance ---
pr_labels = ["release"]
pr_draft = false

# ---------------------------------------------------------------------------
# Per-package overrides.
#
# `changelog_path` is pinned for every crate because the directory name
# (e.g. crates/common) differs from the published package name (olai-uc-common).
#
# `release = false` gates a crate out of the OIDC release cycle. Two distinct
# reasons a crate carries it here — do NOT lump them together:
#
#   (a) BOOTSTRAP GATE — the crate name has never been published, and crates.io
#       OIDC trusted publishing cannot create a brand-new name. It needs a
#       one-time token bootstrap (bootstrap-publish.yml) first. Remove the
#       `release = false` line once the crate is bootstrapped + its Trusted
#       Publisher is registered. Currently NONE — every publishable name is live
#       (delta-api, common, client, object-store, postgres, sqlite). The server
#       will need this bootstrap when it flips from `git_only` to published.
#
#   (b) GIT-DEP BLOCK — the crate depends (transitively, via the workspace
#       `delta_kernel` / `deltalake-core` git revs) on a git source. `cargo
#       publish` rejects ANY git dependency, optional or not, so these crates
#       CANNOT go to crates.io until those deps are published to the registry.
#       This is a hard, standing block — NOT a bootstrap step. `sharing-client`
#       (non-optional `delta_kernel`) and `datafusion` (optional kernel/delta-rs
#       behind the `delta` feature) are both blocked this way.
#
# crates.io publish/bootstrap order (root -> leaf):
#   delta-api, common -> client, object-store, postgres, sqlite -> cli
# (sharing-client, sharing-api, datafusion are out of the order entirely — see
# (b) above; server is git_only — see below.)
#
# Already on crates.io (bootstrapped, releasing via OIDC): delta-api, common,
# client, object-store, postgres, sqlite — these carry NO `release = false`.
#
# `olai-uc-cli` is publishable (no git deps, its deps are live) but is
# intentionally held out of crates.io for now; it keeps `release = false`.
#
# `olai-uc-server` ships as the `mangrove` Docker image (`git_only = true`); it is
# eligible to publish (git-free graph, PR #89) but held back until its sibling
# path deps are re-released to crates.io with the current buffa API — see below.
# ---------------------------------------------------------------------------
[[package]]
name = "olai-uc-delta-api"
changelog_path = "crates/delta-api/CHANGELOG.md"

[[package]]
name = "olai-uc-common"
changelog_path = "crates/common/CHANGELOG.md"

[[package]]
name = "olai-uc-client"
changelog_path = "crates/client/CHANGELOG.md"

[[package]]
name = "olai-uc-sharing-client"
changelog_path = "crates/sharing-client/CHANGELOG.md"
# (b) Git-dep block: non-optional `delta_kernel` git dep — cannot publish to
# crates.io. Standing block, not a bootstrap step.
release = false

[[package]]
name = "olai-uc-sharing-api"
changelog_path = "crates/sharing-api/CHANGELOG.md"
# (b) Git-dep block: owns the kernel-backed query path, so it pulls the
# non-optional `delta_kernel` / `delta_kernel_default_engine` git deps (and
# `olai-uc-datafusion`'s `delta` feature) — cannot publish to crates.io.
# Standing block, not a bootstrap step.
release = false

[[package]]
name = "olai-uc-object-store"
changelog_path = "crates/object-store/CHANGELOG.md"

[[package]]
name = "olai-uc-postgres"
changelog_path = "crates/postgres/CHANGELOG.md"

[[package]]
name = "olai-uc-sqlite"
changelog_path = "crates/sqlite/CHANGELOG.md"

[[package]]
name = "olai-uc-datafusion"
changelog_path = "crates/datafusion/CHANGELOG.md"
# (b) Git-dep block: kernel/delta-rs git deps (optional, behind `delta`) — cargo
# rejects git deps even when optional, so cannot publish to crates.io. Standing
# block, not a bootstrap step.
release = false

[[package]]
name = "olai-uc-server"
changelog_path = "crates/server/CHANGELOG.md"
release = false

[[package]]
name = "olai-uc-cli"
changelog_path = "crates/cli/CHANGELOG.md"
# Publishable (no git deps; its deps client/common are live), but intentionally
# held out of crates.io for now. Remove this line to release the `uc` CLI crate.
release = false

[[package]]
name = "unitycatalog-acceptance"
publish = false
release = false

# ---------------------------------------------------------------------------
# Changelog rendering (git-cliff, embedded). Conventional-commit grouping.
# Because commits use crate scopes (feat(common): ...), each crate's changelog
# naturally contains only commits that touched its files.
# ---------------------------------------------------------------------------
[changelog]
protect_breaking_commits = true
sort_commits = "newest"

commit_parsers = [
  { message = "^feat",     group = "Added" },
  { message = "^fix",      group = "Fixed" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^doc",      group = "Documentation" },
  { message = "^build",    group = "Build" },
  { message = "^test",     skip = true },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
]

# Strip the redundant "(scope)" from each rendered line — each crate's changelog
# is already crate-scoped. Scopes use the crate directory names / short names
# the repo's conventional commits already use.
commit_preprocessors = [
  { pattern = '\((delta-api|common|client|sharing-client|object-store|postgres|sqlite|datafusion|server|cli)\)', replace = "" },
]
