          readOnly: true
          type: string
          description: Username of catalog creator.
        updated_at:
          readOnly: true
          type: string
          description: Time at which this catalog was last updated, in epoch milliseconds.
        updated_by:
          readOnly: true
          type: string
          description: Username of user who last modified catalog.
        browse_only:
          readOnly: true
