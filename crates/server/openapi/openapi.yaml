          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Update an entity tag assignment

         Updates the tag assignment for the specified entity and tag key.
      operationId: UpdateEntityTagAssignment
      parameters:
