      operationId: GetCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialInfo"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CredentialsService
      operationId: DeleteCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CredentialsService
      operationId: UpdateCredential
      parameters:
        - name: name
          in: path
          description: Name of credential.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCredentialRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialInfo"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /entity-tag-assignments:
    post:
      tags:
        - EntityTagAssignmentsService
      description: |-
        Create an entity tag assignment

         Assigns a tag to a Unity Catalog entity.
      operationId: CreateEntityTagAssignment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityTagAssignmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityTagAssignment"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /entity-tag-assignments/{entity_type}/{entity_name}/tags:
    get:
      tags:
        - EntityTagAssignmentsService
      description: |-
        List entity tag assignments

         Gets the tag assignments for the specified entity.
      operationId: ListEntityTagAssignments
      parameters:
        - name: entity_type
          in: path
          description: The type of the entity whose tag assignments to list.
          required: true
          schema:
            type: string
        - name: entity_name
          in: path
          description: The fully qualified name of the entity whose tag assignments to list.
          required: true
          schema:
            type: string
        - name: max_results
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: page_token
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
