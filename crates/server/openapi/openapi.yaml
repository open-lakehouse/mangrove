      description: A table that a SQL object (such as a view or metric view) depends on.
      additionalProperties: false
      title: Table Dependency
    TableSummary:
      type: object
      properties:
        full_name:
          type: string
          description: The full name of the table.
        table_type:
          enum:
            - TABLE_TYPE_UNSPECIFIED
            - MANAGED
            - EXTERNAL
            - VIEW
            - MATERIALIZED_VIEW
            - STREAMING_TABLE
            - METRIC_VIEW
          type: string
          format: enum
          title: Table Type
      additionalProperties: false
      required:
        - full_name
