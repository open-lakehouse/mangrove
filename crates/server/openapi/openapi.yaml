          pattern: ^[a-z][0-9a-z_]*[0-9a-z]$
        url:
          type: string
          description: Path URL of the external location.
          pattern: ^(?:(?:[a-zA-Z][a-zA-Z\d+\-.]*):)?(?://(?:[A-Za-z0-9\-\.]+(?::\d+)?))?(/[^\?#]*)?(?:\?([^\#]*))?(?:\#(.*))?$
