        provider_name:
          type: string
          description: A Delta Sharing catalog is a catalog that is based on a Delta share on a remote sharing server.
          minLength: 3
          pattern: ^[a-z][0-9a-z-_]*[0-9a-z]$
          title: The name of delta sharing provider.
        share_name:
