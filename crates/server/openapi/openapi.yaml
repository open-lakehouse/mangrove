        - name: schema_name
          in: query
          description: The identifier of the schema.
          schema:
            type: string
        - name: max_results
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: page_token
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
        - name: include_browse
          in: query
          description: |-
            Whether to include agents in the response for which the principal can only
             access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAgentsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - AgentsService
      operationId: CreateAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /agents/{name}:
    get:
      tags:
        - AgentsService
      operationId: GetAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
        - name: include_browse
          in: query
          description: |-
            Whether to include agents in the response for which the principal can only
             access selective metadata for.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - AgentsService
      operationId: DeleteAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - AgentsService
      operationId: UpdateAgent
      parameters:
        - name: name
          in: path
          description: The three-level (fully qualified) name of the agent.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /catalogs:
    get:
      tags:
        - CatalogsService
      description: |-
        List catalogs

         Gets an array of catalogs in the metastore. If the caller is the metastore admin,
         all catalogs will be retrieved. Otherwise, only catalogs owned by the caller
         (or for which the caller has the USE_CATALOG privilege) will be retrieved.
         There is no guarantee of a specific ordering of the elements in the array.
      operationId: ListCatalogs
      parameters:
        - name: max_results
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: page_token
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCatalogsResponse"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    post:
      tags:
        - CatalogsService
      description: |-
        Create a new catalog

         Creates a new catalog instance in the parent metastore if the caller
         is a metastore admin or has the CREATE_CATALOG privilege.
      operationId: CreateCatalog
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCatalog"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogInfo"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /catalogs/{name}:
    get:
      tags:
        - CatalogsService
      description: |-
        Get a catalog

         Gets the specified catalog in a metastore. The caller must be a metastore admin,
         the owner of the catalog, or a user that has the USE_CATALOG privilege set for their account.
      operationId: GetCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: include_browse
          in: query
          description: Whether to include catalogs in the response for which the principal can only access selective metadata for
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogInfo"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    delete:
      tags:
        - CatalogsService
      description: |-
        Delete a catalog

         Deletes the catalog that matches the supplied name. The caller must
         be a metastore admin or the owner of the catalog.
      operationId: DeleteCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
        - name: force
          in: query
          description: Force deletion even if the catalog is not empty.
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
    patch:
      tags:
        - CatalogsService
      description: |-
        Update a catalog

         Updates the catalog that matches the supplied name. The caller must be either
         the owner of the catalog, or a metastore admin (when changing the owner field of the catalog).
      operationId: UpdateCatalog
      parameters:
        - name: name
          in: path
          description: Name of catalog.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCatalogRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogInfo"
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /credentials:
    get:
      tags:
        - CredentialsService
      operationId: ListCredentials
      parameters:
        - name: purpose
          in: query
          description: Return only credentials for the specified purpose.
          schema:
            enum:
              - PURPOSE_UNSPECIFIED
              - STORAGE
              - SERVICE
            type: string
            format: enum
        - name: max_results
          in: query
          description: The maximum number of results per page that should be returned.
          schema:
            type: integer
            format: int32
        - name: page_token
          in: query
          description: Opaque pagination token to go to next page based on previous query.
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCredentialsResponse"
        default:
          description: Default error response
          content:
