# Trestle codegen config for the resource-oriented Unity Catalog surface.
#
# `just generate-code` reads this; `buf.gen.yaml` is hand-maintained separately
# (mangrove runs `buf generate` directly, not via a trestle-emitted buf config).
#
# Output fields are crate `src` roots — the generator appends the convention
# subdir (`codegen` for handler/client/binding glue, `_gen` for the co-located
# model tree). Naming overrides are explicit because `unitycatalog_common` /
# `UnityCatalogClient` / the `UC` error prefix are not derivable from the
# project name.
version: 1
project:
  name: unitycatalog
generate:
  proto_lib: buffa
  # Serialize snake_case (proto) JSON field names on the wire — Unity Catalog
  # requires snake_case bodies (e.g. `catalog_name`), which buffa can't emit
  # natively (it hardcodes proto3-JSON camelCase). trestle post-processes the
  # buffa output to swap the serde rename/alias so it emits snake_case while
  # still accepting camelCase on read. Only valid under `proto_lib: buffa`.
  json_field_names: proto
  descriptors: descriptors.bin

  servers:
    rest: true

  clients:
    rust:
      output: crates/client/src
    python:
      output: python/client/src
      error_type: PyUnityCatalogError
      result_type: PyUnityCatalogResult
      typings_package_filter: unitycatalog
    node:
      napi:
        output: node/client/src
        error_ext_trait: NapiErrorExt
      ts:
        output: node/client/unitycatalog

  bindings:
    aggregate_client_name: UnityCatalogClient
    client_crate_name: unitycatalog_client
    error_base_class: UnityCatalogError
    error_code_prefix: UC

  models:
    dir: crates/common/src/models
    crate_name: unitycatalog_common

  server:
    output: crates/server/src
    error_type_path: crate::Error
    resource_enum: true
    store_integration: true
    object_conversions: true
    resource_clients: true
    resource_store_crate_name: olai_store

enrich_openapi:
  spec: openapi/openapi.yaml
  jsonschema_dir: openapi/jsonschema
  # Present the emitted OpenAPI component keys under the official Unity Catalog
  # `*Info` naming without renaming the proto messages (which would rename the
  # Rust/Python/Node model types too). gnostic derives the schema key from the
  # message name with no override, so trestle rewrites the keys + all `$ref`s in
  # the enrich pass. Maps current key -> desired key; absent source keys are
  # ignored. Keeps the generated spec aligned with the reference RP spec / the
  # node unity-catalog-client's expected schema names.
  schema_renames:
    Catalog: CatalogInfo
    Schema: SchemaInfo
    Table: TableInfo
    Column: ColumnInfo
    Volume: VolumeInfo
    Function: FunctionInfo
    RegisteredModel: RegisteredModelInfo
    Credential: CredentialInfo
    ExternalLocation: ExternalLocationInfo
    CreateCatalogRequest: CreateCatalog
    CreateSchemaRequest: CreateSchema
    CreateRegisteredModelRequest: CreateRegisteredModel
    CreateExternalLocationRequest: CreateExternalLocation
    CreateVolumeRequest: CreateVolumeRequestContent
    ListVolumesResponse: ListVolumesResponseContent
  # gnostic emits its own OpenAPI meta-model `Schema` (pulled in via the
  # gnostic/openapi/v3 annotations import used for operation_id), which collides
  # with and overwrites our `unitycatalog.schemas.v1.Schema` entity — the emitted
  # component ends up with meta-object fields (nullable, discriminator, …) instead
  # of the real ones. Rebuild it from the authoritative JSON Schema. `Schema` is
  # the only proto<->gnostic name clash. Applied before the rename above, so the
  # corrected component becomes `SchemaInfo`.
  schema_overrides:
    - Schema
