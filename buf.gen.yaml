version: v2
managed:
  enabled: true
  disable:
    # Disables all go_package changes for this module only
    - file_option: go_package
      module: buf.build/googleapis/googleapis
  override:
    # Sets default go_package_prefix for all inputs
    - file_option: go_package_prefix
      value: github.com/delta-incubator/delta-sharing-rs/go
plugins:
  # Model generation (buffa runtime). Buffa emits its own `Message` impls plus
  # native serde (JSON), so the historical prost + prost-serde + tonic plugin
  # stack is replaced by this single plugin. The `#[pyclass]`/`#[napi]` attribute
  # injection the prost stack used is gone: buffa has no attribute opt, so PyO3
  # boundary conversions are emitted by trestle into `models/_gen/pyo3_impls.rs`
  # (see proto-gen.yaml `runtime: buffa`), and the node binding crosses the napi
  # boundary by buffa-encoding to bytes.
  - remote: buf.build/anthropics/buffa:v0.7.0
    out: crates/common/src/models/gen
    opt:
      - json=true
      # One consolidated `<package>.rs` per proto package (the flat layout the
      # trestle-generated `models/_gen/mod.rs` `include!`s), instead of buffa's
      # default split `<package>.mod.rs`/`.models.rs`/`.svc.rs` tree.
      - file_per_package=true
  - remote: buf.build/community/google-gnostic-openapi:v0.7.1
    out: openapi
  - remote: buf.build/bufbuild/es:v2.12.1
    out: node/client/unitycatalog/models/gen
    opt:
      - target=ts
      - json_types=false
