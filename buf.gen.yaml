version: v2
managed:
  enabled: true
  disable:
    # Disables all go_package changes for this module only
    - file_option: go_package
      module: buf.build/googleapis/googleapis
  override:
    # Sets default go_package_prefix for all inputs
    - file_option: go_package_prefix
      value: github.com/delta-incubator/delta-sharing-rs/go
plugins:
  # Model generation (buffa runtime). buffa emits its own `Message` impls plus
  # native serde (JSON), so the historical prost + prost-serde + tonic plugin
  # stack collapses to this single plugin. The prost `message_attribute` /
  # `enum_attribute` `#[pyclass]` injection is gone — buffa has no attribute opt,
  # so the PyO3 boundary is emitted by trestle as `Py*` wrappers in
  # `models/_gen/pyo3_impls.rs` (see trestle.yaml). `json_field_names: proto` in
  # trestle.yaml post-processes buffa's camelCase JSON names to snake_case for
  # Unity Catalog wire-compat. Opts mirror trestle's canonical buffa buf.gen
  # (`config/buf_gen.rs`): `json`, `file_per_package` — no `flat_output_dir`
  # (prost-only).
  - remote: buf.build/anthropics/buffa:v0.7.0
    out: crates/common/src/models/_gen
    opt:
      - json=true
      - file_per_package=true
  - remote: buf.build/community/google-gnostic-openapi:v0.7.1
    out: openapi
    opt:
      # Emit snake_case JSON field names and string-valued enums so the rendered
      # OpenAPI matches the actual UC wire format (the serde layer serializes
      # snake_case + string enum names). Defaults are naming=json (camelCase) and
      # enum_type=integer, which drift the spec away from the wire.
      - naming=proto
      - enum_type=string
  - remote: buf.build/bufbuild/es:v2.12.1
    out: node/client/unitycatalog/codegen/models/gen
    opt:
      - target=ts
      - json_types=false
