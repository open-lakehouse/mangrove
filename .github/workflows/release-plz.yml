name: Release-plz

# Automated releases. On every push to `main`, release-plz opens/updates a
# single "Release PR" containing per-crate version bumps + regenerated
# changelogs. When that PR is merged, release-plz creates the per-crate git tags
# + GitHub Releases and publishes the crates to crates.io via OIDC trusted
# publishing.
#
# The CLI (`olai-uc-cli`) additionally ships as a container image: after the
# release job, the `docker` job builds + pushes it to GHCR via a reusable
# workflow (workflow_call), keyed off the version release-plz just published.
# Running it in the SAME workflow keeps the build explicitly gated on "the cli
# was released this run" — no second trigger to reason about, and the version is
# passed in directly rather than re-derived from a tag event.
#
# Bootstrap note: crates with `release = false` in release-plz.toml have not yet
# had their one-time token bootstrap publish (.github/workflows/bootstrap-
# publish.yml) and are versioned/tagged but not published here. See CONTRIBUTING.md.
#
# See release-plz.toml; CONTRIBUTING.md has the full flow.

on:
  push:
    branches:
      - main

# Least privilege: grant per job, nothing at the top level.
permissions: {}

jobs:
  # --- Open/update the Release PR (version bumps + changelogs) ---
  release-plz-pr:
    name: Release PR
    # Never run from forks — they must not open release PRs.
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the release-plz-* branch
      pull-requests: write # create/update the Release PR
    # Avoid two pushes to main racing to open/update the same PR.
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # release-plz needs full history to analyze commits
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          # Matches the rest of CI; stays above the 1.91 workspace floor.
          toolchain: "1.96"
      - name: Run release-plz (release-pr)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          # SQLX_OFFLINE so cargo-semver-checks / metadata don't probe a live DB.
          SQLX_OFFLINE: "true"
          # Optional PAT/App token so the Release PR runs CI under a non-
          # GITHUB_TOKEN identity (a PR opened with GITHUB_TOKEN doesn't itself
          # start PR checks). Falls back to GITHUB_TOKEN when unset.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # --- Tag + GitHub Release + cargo publish, after the Release PR is merged ---
  # release-plz publishes every crate whose `release` is not false to crates.io
  # via OIDC. The cli's published version is read back from its Cargo.toml (the
  # merged Release PR already bumped it) and, if a fresh `olai-uc-cli-v<ver>` tag
  # was created this run, exposed as an output so the Docker job fires.
  release-plz-release:
    name: Release
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release # protected env gating the crates.io publish
    permissions:
      contents: write # create tags + GitHub Releases
      id-token: write # crates.io OIDC publish
    outputs:
      # cli version + tag IF this run released the cli (tag was newly created),
      # else empty — the Docker job keys off this.
      cli_version: ${{ steps.cli.outputs.version }}
      cli_tag: ${{ steps.cli.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
      # No CARGO_REGISTRY_TOKEN: crates.io publish authenticates via OIDC
      # (`id-token: write`). Crates with `release = false` are skipped.
      - name: Run release-plz (release)
        id: release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          SQLX_OFFLINE: "true"
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      # Determine whether the cli was released this run, to gate the Docker build.
      # Read the (already-bumped) version from crates/cli/Cargo.toml and check
      # whether the `olai-uc-cli-v<version>` tag exists yet. release-plz's own
      # `release` step creates the tag when it publishes the cli; we look it up
      # here to drive the Docker job in the same workflow. Idempotent: if the tag
      # predates this run (cli unchanged), outputs stay empty and Docker is skipped.
      - name: Detect cli release
        id: cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 '^version = ' crates/cli/Cargo.toml \
            | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::could not parse cli version from crates/cli/Cargo.toml"
            exit 1
          fi
          tag="olai-uc-cli-v${version}"
          # release-plz creates this tag when it publishes the cli. If it exists
          # AND points at the current commit, the cli was released in this run.
          if git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            tag_sha=$(git ls-remote --tags origin "$tag" | cut -f1)
            head_sha=$(git rev-parse HEAD)
            # Compare against the commit the merged Release PR landed (HEAD).
            if [ "${tag_sha}" = "${head_sha}" ] || git merge-base --is-ancestor "$tag_sha" HEAD 2>/dev/null; then
              echo "cli ${version} released this run (tag ${tag})."
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "cli not released this run (no fresh ${tag}); skipping Docker."

  # --- Build + push the cli (hydrofoil) Docker image, iff the cli was released ---
  docker:
    name: Docker release
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.cli_version != '' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/docker-release.yml
    with:
      version: ${{ needs.release-plz-release.outputs.cli_version }}
      ref: ${{ needs.release-plz-release.outputs.cli_tag }}
