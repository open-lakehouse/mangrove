name: Release-plz

# Automated releases. On every push to `main`, release-plz opens/updates a
# single "Release PR" containing per-crate version bumps + regenerated
# changelogs. When that PR is merged, release-plz creates the per-crate git tags
# + GitHub Releases and publishes the crates to crates.io via OIDC trusted
# publishing.
#
# The server (`olai-uc-server`) is a DEPLOYABLE, not a crates.io library: it is
# `git_only` in release-plz.toml (tagged from git, never published) and ships as
# the `mangrove` container image instead. After the release job, the `docker`
# job builds + pushes it to GHCR via a reusable workflow (workflow_call), keyed
# off the version release-plz just tagged. Running it in the SAME workflow keeps
# the build explicitly gated on "the server was released this run" — no second
# trigger to reason about, and the version is passed in directly rather than
# re-derived from a tag event.
#
# Bootstrap note: crates with `release = false` in release-plz.toml have not yet
# had their one-time token bootstrap publish (.github/workflows/bootstrap-
# publish.yml) and are versioned/tagged but not published here. See CONTRIBUTING.md.
#
# See release-plz.toml; CONTRIBUTING.md has the full flow.

on:
  push:
    branches:
      - main

# Least privilege: grant per job, nothing at the top level.
permissions: {}

jobs:
  # --- Open/update the Release PR (version bumps + changelogs) ---
  release-plz-pr:
    name: Release PR
    # Never run from forks — they must not open release PRs.
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the release-plz-* branch
      pull-requests: write # create/update the Release PR
    # Avoid two pushes to main racing to open/update the same PR.
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # release-plz needs full history to analyze commits
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          # Matches the rest of CI; stays above the 1.91 workspace floor.
          toolchain: "1.97"
      - name: Run release-plz (release-pr)
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          # SQLX_OFFLINE so cargo-semver-checks / metadata don't probe a live DB.
          SQLX_OFFLINE: "true"
          # Optional PAT/App token so the Release PR runs CI under a non-
          # GITHUB_TOKEN identity (a PR opened with GITHUB_TOKEN doesn't itself
          # start PR checks). Falls back to GITHUB_TOKEN when unset.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

  # --- Tag + GitHub Release + cargo publish, after the Release PR is merged ---
  # release-plz publishes every crate whose `release` is not false to crates.io
  # via OIDC. The DEPLOYABLE server (`olai-uc-server`, `git_only = true`) is not
  # published — it is tagged from git, and that tag drives the Docker image.
  #
  # NOTE: release-plz does NOT include `git_only` packages in the `releases` JSON
  # its `release` command emits, and (with no prior baseline tag to derive from)
  # does NOT itself push the `olai-uc-server-v<version>` tag — so we cannot rely
  # on that tag already existing (doing so silently skips the server forever).
  # Instead the `server` step below reads the version from crates/server/Cargo.toml
  # (which the merged Release PR already bumped), and if no matching
  # `olai-uc-server-v<version>` tag exists yet, creates it + a GitHub Release. The
  # presence of a freshly-created tag is what fires the Docker job.
  release-plz-release:
    name: Release
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release # protected env gating the crates.io publish
    permissions:
      contents: write # create tags + GitHub Releases
      id-token: write # crates.io OIDC publish
    outputs:
      # server version + tag IF this run released the server (tag was newly
      # created), else empty — the Docker job keys off this.
      server_version: ${{ steps.server.outputs.version }}
      server_tag: ${{ steps.server.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.97"
      # No CARGO_REGISTRY_TOKEN: crates.io publish authenticates via OIDC
      # (`id-token: write`). Crates with `release = false` are skipped.
      - name: Run release-plz (release)
        id: release
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          SQLX_OFFLINE: "true"
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      # Tag + release the server ourselves. release-plz omits `git_only` packages
      # from its `releases` output, so we cannot read the version from there. Read
      # it from the manifest the Release PR already bumped, and if the
      # `olai-uc-server-v<version>` tag does not exist yet, create it + a GitHub
      # Release. Setting `version`/`tag` then fires the Docker job. When the tag
      # already exists (e.g. a re-run, or a push that did not bump the server),
      # the outputs stay empty and Docker is skipped — idempotent by design.
      - name: Tag + release server
        id: server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 '^version = ' crates/server/Cargo.toml \
            | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error::could not parse server version from crates/server/Cargo.toml"
            exit 1
          fi
          tag="olai-uc-server-v${version}"
          # The remote is the source of truth (this checkout has persist-
          # credentials=false, so we don't push via git here — `gh release
          # create` creates the tag at HEAD and authenticates via GH_TOKEN).
          if gh release view "$tag" >/dev/null 2>&1 \
            || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag/release ${tag} already exists — server not released this run."
            exit 0
          fi
          echo "Releasing server ${version} (tag ${tag})."
          # `gh release create` creates the tag at the current commit (the merge
          # commit that bumped the manifest) and the GitHub Release in one step.
          # Body is the crate's changelog section for THIS version (skipping the
          # leading `## [Unreleased]`), matching what release-plz produces for
          # the published crates.
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}' crates/server/CHANGELOG.md)
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "olai-uc-server v${version}" \
            --notes "${notes:-olai-uc-server v${version}}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # --- Build + push the server (mangrove) Docker image, iff it was released ---
  docker:
    name: Docker release
    needs: release-plz-release
    if: ${{ needs.release-plz-release.outputs.server_version != '' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/docker-release.yml
    with:
      version: ${{ needs.release-plz-release.outputs.server_version }}
      ref: ${{ needs.release-plz-release.outputs.server_tag }}
