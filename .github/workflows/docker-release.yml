name: Release Docker Image

# Build and publish the `mangrove` image (the `uc-server` binary — a lakehouse
# catalog server, with the bundled web UI baked in) to the GitHub Container
# Registry.
# The matrix axis is the *platform* only, and one GHCR image is produced. We
# publish to GHCR only (keyless GITHUB_TOKEN — no stored registry secret).
#
# Primary trigger is `workflow_call` from release-plz.yml: when release-plz
# releases (git-tags) a new `olai-uc-server` version, it calls this workflow with
# that version + the release tag to build from. `workflow_dispatch` allows a
# manual rebuild of an existing release (e.g. base-image CVE refresh). Those are
# the ONLY triggers — there is no build on push/PR, so the image is only ever
# built for an actual server release (or a deliberate manual rebuild).
#
# A run builds multi-arch (amd64 + native arm64), pushes each arch by digest,
# then a merge job assembles the multi-arch manifest list, applies the tags, and
# signs the index keyless via cosign.

on:
  workflow_call:
    inputs:
      version:
        description: "Released olai-uc-server version, e.g. 0.0.1 (no v prefix)."
        required: true
        type: string
      ref:
        description: "Git ref/tag to build from (the release-plz tag, e.g. olai-uc-server-v0.0.1)."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "olai-uc-server version to tag the image, e.g. 0.0.1."
        required: true
        type: string
      ref:
        description: "Git ref/tag to build from, e.g. olai-uc-server-v0.0.1."
        required: true
        type: string

# Cancel superseded runs on the same version.
concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more.
permissions: {}

env:
  IMAGE: ghcr.io/open-lakehouse/mangrove

jobs:
  # Build each platform on its NATIVE runner and push BY DIGEST (no tags).
  # Native arm64 avoids slow QEMU emulation of the Rust/cargo compile.
  build:
    name: Build (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}

    # Publish only from the canonical repo (a fork calling this workflow must not
    # push to our GHCR namespace). The triggers are already release-only
    # (workflow_call / workflow_dispatch), so no event-name gate is needed.
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}

    permissions:
      contents: read
      packages: write # push to ghcr.io with GITHUB_TOKEN
      id-token: write # build provenance / SBOM attestations

    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            os: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            os: linux/arm64
            runner: ubuntu-24.04-arm # native arm64 hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          # Check out the exact tag release-plz published (always supplied — a
          # required input on both triggers).
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI labels + manifest-level annotations for the per-arch image. (Index-
      # level annotations are applied later in the merge job.)
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.title=mangrove
            org.opencontainers.image.description=Mangrove — a lakehouse catalog server (Unity Catalog + Delta Sharing APIs) with bundled web UI
            org.opencontainers.image.vendor=open-lakehouse
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/open-lakehouse/mangrove
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Build + push by digest only (no tags here — the merge job assembles the
      # multi-arch manifest list and applies the tags). Per-arch cache scope so
      # concurrent matrix builds do not clobber each other's gha cache.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform.os }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform.arch }}

      - name: Export digest
        # Route the digest through env (not inline ${{ }}) so it is never
        # spliced into the shell — keeps the template-injection audit clean.
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: digests-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into one multi-arch manifest list, apply the
  # tags, then sign the resulting index by digest (keyless).
  merge:
    name: Merge and sign
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write # gh release edit/upload to link + attach provenance
      packages: write
      id-token: write # cosign keyless signing

    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy: the released `<inputs.version>` (e.g. 0.0.1) via
      # type=semver, which also sets `latest` for a non-prerelease version
      # (flavor latest=auto). type=semver reads the version from the
      # `inputs.version` we feed it (there is no git-tag push event to derive
      # from on workflow_call). DOCKER_METADATA_ANNOTATIONS_LEVELS=index emits
      # index-level OCI annotations (manifest-level labels from a per-arch build
      # do NOT propagate to the multi-arch index created by imagetools).
      - name: Generate metadata and tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
          flavor: |
            latest=auto
          labels: |
            org.opencontainers.image.title=mangrove
            org.opencontainers.image.description=Mangrove — a lakehouse catalog server (Unity Catalog + Delta Sharing APIs) with bundled web UI
            org.opencontainers.image.vendor=open-lakehouse
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/open-lakehouse/mangrove
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Create the manifest list referencing the per-arch digests, for each tag.
      # Index-level OCI annotations from metadata-action are applied here (they
      # cannot be set on the index by the per-arch build step).
      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.IMAGE }}
        run: |
          # Build arrays so no unquoted word-splitting is needed.
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=(); for t in "${tags[@]}"; do tag_args+=(-t "$t"); done
          ann_args=()
          while IFS= read -r a; do
            [ -n "$a" ] && ann_args+=(--annotation "$a")
          done <<< "$DOCKER_METADATA_OUTPUT_ANNOTATIONS"
          srcs=(); for d in *; do srcs+=("${IMAGE}@sha256:${d}"); done
          docker buildx imagetools create "${tag_args[@]}" "${ann_args[@]}" "${srcs[@]}"

      - name: Inspect and capture index digest
        id: digest
        run: |
          ref=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$ref"
          d=$(docker buildx imagetools inspect "$ref" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "index=$d" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      # Keyless signing via GitHub OIDC (Fulcio/Rekor). Sign each distinct
      # repo@indexDigest once.
      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.digest.outputs.index }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | sed "s/:.*\$/@$DIGEST/" | sort -u | \
            xargs --no-run-if-empty cosign sign --yes

      # Associate the GitHub Release (olai-uc-server-v<version>, already created by
      # release-plz.yml) with the image we just pushed: append a package-version
      # deep link to the notes and attach immutable provenance assets (the index
      # digest pin + the per-arch SBOMs that were baked into the image). GHCR has
      # no native package<->release binding, so this cross-reference is the link.
      # `inputs.version` is a required input on both triggers, so the guard below
      # is belt-and-suspenders only.
      - name: Link and attach provenance to release
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ steps.digest.outputs.index }}
          IMAGE: ${{ env.IMAGE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no repo checkout, so `gh release` cannot infer the repo
          # from a local git remote (it errors "not a git repository"). Pin the
          # target repo explicitly so every gh call resolves without a checkout.
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="olai-uc-server-v${VERSION}"

          # Provenance files. The digest pin is authoritative and API-independent.
          printf '%s@%s\n' "${IMAGE}:${VERSION}" "${DIGEST}" > "mangrove-${VERSION}.digest.txt"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{ json (index .SBOM "linux/amd64").SPDX }}' > "mangrove-${VERSION}.amd64.spdx.json"
          docker buildx imagetools inspect "${IMAGE}:${VERSION}" \
            --format '{{ json (index .SBOM "linux/arm64").SPDX }}' > "mangrove-${VERSION}.arm64.spdx.json"

          # Deep link to the exact GHCR package version; fall back to the package
          # page if the packages API has not indexed the new version yet.
          vid=$(gh api "/orgs/open-lakehouse/packages/container/mangrove/versions" \
            --jq ".[] | select(.metadata.container.tags[]? == \"${VERSION}\") | .id" | head -1 || true)
          if [ -n "$vid" ]; then
            url="https://github.com/open-lakehouse/mangrove/pkgs/container/mangrove/${vid}?tag=${VERSION}"
          else
            url="https://github.com/open-lakehouse/mangrove/pkgs/container/mangrove"
          fi

          # Idempotent on re-run (e.g. a workflow_dispatch rebuild): only append
          # the pointer if the notes don't already carry a "Container image:" line.
          body=$(gh release view "$tag" --json body -q .body)
          line="**Container image:** \`${IMAGE}:${VERSION}\` (\`${DIGEST}\`) — [package version](${url})"
          if printf '%s' "$body" | grep -qF '**Container image:**'; then
            echo "Release notes already reference the container image — leaving notes unchanged."
          else
            printf '%s\n\n%s\n' "$body" "$line" | gh release edit "$tag" --notes-file -
          fi

          gh release upload "$tag" \
            "mangrove-${VERSION}.digest.txt" \
            "mangrove-${VERSION}.amd64.spdx.json" \
            "mangrove-${VERSION}.arm64.spdx.json" --clobber
