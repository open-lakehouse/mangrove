name: Bootstrap publish (one-shot, DELETE AFTER USE)

# ONE-TIME bootstrap to create the never-published `olai-uc-*` crate names on
# crates.io. crates.io OIDC trusted publishing (used by the steady-state
# release-plz.yml) cannot publish a name that has never existed, so this job
# does the first publish of each crate with a CARGO_REGISTRY_TOKEN instead.
#
# Staged, tier by tier. `cargo publish` builds each crate against the crates.io
# copies of its deps, so a dependent can only publish AFTER its deps already
# exist there. The publish steps below are grouped by dependency tier; only the
# tiers whose deps are already on crates.io are uncommented. Each PR uncomments
# the next tier once the prior tier has published.
#
# STATUS (2026-07): the original bootstrap already put these on crates.io, and
# they now release via OIDC (no `release = false`): olai-uc-common,
# olai-uc-client, olai-uc-object-store, olai-uc-postgres, olai-uc-sqlite,
# olai-uc-delta-api.
#
# The ONLY crate still needing a bootstrap is olai-uc-server. It just became a
# published crate (library + the `uc-server` binary) after PR #89 removed the
# git-pinned Delta Sharing query surface from its dependency graph. Its deps are
# all registry/workspace (no git), so it bootstraps cleanly. We bootstrap the
# `bin`-featured build, since that (the `uc-server` binary) is what ships.
#
#   Tier 0 (ACTIVE): olai-uc-server
#
# NOT bootstrappable here — do NOT add steps for these:
#   * olai-uc-sharing-client, olai-uc-sharing-api, olai-uc-datafusion — depend
#     (transitively, via the workspace `delta_kernel` / `deltalake-core` git
#     revs) on a git source. `cargo publish` rejects ANY git dependency, so these
#     cannot go to crates.io until those upstream deps are published to the
#     registry. They stay `release = false` in release-plz.toml (git-dep block).
#   * olai-uc-cli — publishable, but intentionally held out of crates.io for now.
#
# Run once with dry_run=true to package-check the active tier, then again with
# dry_run=false to actually publish.
#
# Prerequisite: a temporary `CARGO_REGISTRY_TOKEN` repo secret (a crates.io API
# token with publish scope) on the protected `release` environment.
#
# After bootstrapping olai-uc-server, decommission it:
#   1. Register Trusted Publishing on crates.io for olai-uc-server
#      (repo open-lakehouse/mangrove, workflow release-plz.yml, env release).
#   2. Remove its `release = false` line in release-plz.toml so release-plz
#      publishes it via OIDC from then on.
#   3. olai-uc-server is the LAST crate needing a token bootstrap — so after this,
#      DELETE this workflow file entirely, then delete + revoke the
#      CARGO_REGISTRY_TOKEN secret (matching the sibling headwaters repo, which
#      has no bootstrap workflow and publishes 100% via OIDC).
#
# Manual trigger only — never runs automatically, so it can't race release-plz.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only, do not actually publish"
        type: boolean
        default: true

permissions: {}

jobs:
  bootstrap-publish:
    name: Bootstrap publish
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release # reuse the protected release environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.97"

      # ----- Tier 0: olai-uc-server (deps all on crates.io; graph is git-free) -----
      # Publish the `bin`-featured build — the `uc-server` binary is what ships
      # (and it exercises the full dependency set: postgres/sqlite backends, the
      # proxy, swagger UI, the CLI parser). `--locked` uses the committed lockfile.
      - name: Publish olai-uc-server
        run: |
          cargo publish -p olai-uc-server --locked --features bin \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          SQLX_OFFLINE: "true"
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
