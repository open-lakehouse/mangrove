name: Bootstrap publish (one-shot, DELETE AFTER USE)

# ONE-TIME bootstrap to create the never-published `olai-uc-*` crate names on
# crates.io. crates.io OIDC trusted publishing (used by the steady-state
# release-plz.yml) cannot publish a name that has never existed, so this job
# does the first publish of each crate with a CARGO_REGISTRY_TOKEN instead.
#
# Staged, tier by tier. `cargo publish` builds each crate against the crates.io
# copies of its deps, so a dependent can only publish AFTER its deps already
# exist there. The publish steps below are grouped by dependency tier; only the
# tiers whose deps are already on crates.io are uncommented. Each PR uncomments
# the next tier once the prior tier has published.
#
# STATUS (2026-07): the original bootstrap already put these on crates.io, and
# they now release via OIDC (no `release = false`): olai-uc-common,
# olai-uc-client, olai-uc-object-store, olai-uc-postgres, olai-uc-sqlite.
#
# The ONLY crate still needing a bootstrap is the newly-extracted
# olai-uc-delta-api. It is a new root of the graph: the current `client` source
# now depends on it, so `client`'s next release needs delta-api on crates.io
# first. Its deps are all registry/workspace (no git), so it bootstraps cleanly.
#
#   Tier 0 (ACTIVE): olai-uc-delta-api
#
# NOT bootstrappable here — do NOT add steps for these:
#   * olai-uc-sharing-client, olai-uc-datafusion — depend (transitively, via the
#     workspace `delta_kernel` / `deltalake-core` git revs) on a git source.
#     `cargo publish` rejects ANY git dependency, so these cannot go to crates.io
#     until those upstream deps are published to the registry. They stay
#     `release = false` in release-plz.toml as a standing git-dep block.
#   * olai-uc-server — a deployable, shipped as the `hydrofoil` Docker image, not
#     a crates.io library (`git_only = true` in release-plz.toml).
#   * olai-uc-cli — publishable, but intentionally held out of crates.io for now.
#
# Run once with dry_run=true to package-check the active tier, then again with
# dry_run=false to actually publish.
#
# Prerequisite: a temporary `CARGO_REGISTRY_TOKEN` repo secret (a crates.io API
# token with publish scope) on the protected `release` environment.
#
# After bootstrapping delta-api, decommission it:
#   1. Register Trusted Publishing on crates.io for olai-uc-delta-api
#      (repo open-lakehouse/mangrove, workflow release-plz.yml, env release).
#   2. Remove its `release = false` line in release-plz.toml so release-plz
#      publishes it via OIDC from then on.
#   3. Once no crate needs a token bootstrap: delete this workflow file, then
#      delete + revoke the CARGO_REGISTRY_TOKEN secret.
#
# Manual trigger only — never runs automatically, so it can't race release-plz.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package only, do not actually publish"
        type: boolean
        default: true

permissions: {}

jobs:
  bootstrap-publish:
    name: Bootstrap publish
    if: ${{ github.repository == 'open-lakehouse/mangrove' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: release # reuse the protected release environment
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"

      # ----- Tier 0: olai-uc-delta-api (root; deps are all registry/workspace) -----
      - name: Publish olai-uc-delta-api
        run: |
          cargo publish -p olai-uc-delta-api --locked \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          SQLX_OFFLINE: "true"
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
