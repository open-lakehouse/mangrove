name: node-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  node-unit-tests:
    name: node-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # bun.lock must ship with empty resolution fields (no private registry proxy
      # URLs). Fail fast if a PR bakes them in; do not mutate the lockfile here —
      # that would defeat --frozen-lockfile. Run `bun run strip-lock-proxy` locally
      # before opening a PR (the pre-commit hook does this when bun.lock is staged).
      - name: Install dependencies
        run: |
          bun run scripts/strip-bun-lock-proxy.ts --check
          bun install --frozen-lockfile

      - name: Build NAPI binding
        # Regenerate the TypeScript declarations (`--dts`) so a stale committed
        # `native.d.ts` cannot silently break `tsc` when the Rust NAPI surface
        # changes; the type definitions are always rebuilt from the binding.
        # Output into the co-located `unitycatalog/codegen/` dir (matching the
        # `build:debug`/`build:release` package scripts) so the generated glue
        # (`native.js`/`native.d.ts`) and binary sit beside `client.ts`.
        # `-- --locked` forwards to cargo so the NAPI build resolves strictly from
        # Cargo.lock and can never silently re-resolve a git dep to a drifted rev.
        run: bunx napi build --platform --release --output-dir unitycatalog/codegen --dts native.d.ts --js native.js -- --locked
        working-directory: node/client

      - name: Compile TypeScript
        run: bun run tsc
        working-directory: node/client

      - name: Copy .node artifact to dist
        # `dist/codegen/native.js` resolves the binary via `require("./client.<platform>.node")`,
        # so the artifact must sit next to it under `dist/codegen/`.
        run: cp unitycatalog/codegen/client.linux-x64-gnu.node dist/codegen/client.linux-x64-gnu.node
        working-directory: node/client

      - name: Run unit tests
        run: bun run test
        working-directory: node/client

  # Guard the unity-catalog-client's generated OpenAPI types against drift from
  # the canonical spec. The spec itself is NOT regenerated here (that needs the
  # trestle CLI + a ../trestle checkout, unavailable in CI) — we only re-run
  # openapi-typescript against the already-committed openapi/openapi.yaml and
  # fail if src/uc-api.d.ts is stale. Mirrors the ui-fingerprint-check pattern.
  uc-client-types-drift:
    name: uc-client-types-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: |
          bun run scripts/strip-bun-lock-proxy.ts --check
          bun install --frozen-lockfile

      - name: Regenerate uc-api.d.ts from the canonical spec
        run: bun run gen:api
        working-directory: node/unity-catalog-client

      - name: Fail if uc-api.d.ts is stale
        run: |
          if ! git diff --exit-code -- node/unity-catalog-client/src/uc-api.d.ts; then
            echo "::error::node/unity-catalog-client/src/uc-api.d.ts is out of sync with openapi/openapi.yaml — run \`just generate-node-openapi\` (or \`bun run gen:api\` in the package) and commit the result." >&2
            exit 1
          fi
