name: node-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  # Fetch npm packages from the public registry in CI. Local dev resolves through
  # the internal mirror (npm-proxy.cloud.databricks.com) via the developer's own
  # ~/.npmrc, which bakes mirror hosts into package-lock.json `resolved` URLs that
  # GitHub runners can't reach. This env override + npm's default
  # `replace-registry-host=npmjs` rewrites those hosts at fetch time, so CI works
  # without a committed .npmrc (which would break local installs behind the proxy).
  npm_config_registry: https://registry.npmjs.org/

jobs:
  node-unit-tests:
    name: node-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: node/client

      - name: Build NAPI binding
        # Regenerate the TypeScript declarations (`--dts`) so a stale committed
        # `native.d.ts` cannot silently break `tsc` when the Rust NAPI surface
        # changes; the type definitions are always rebuilt from the binding.
        # Output into the co-located `unitycatalog/codegen/` dir (matching the
        # `build:debug`/`build:release` package scripts) so the generated glue
        # (`native.js`/`native.d.ts`) and binary sit beside `client.ts`.
        # `-- --locked` forwards to cargo so the NAPI build resolves strictly from
        # Cargo.lock and can never silently re-resolve a git dep to a drifted rev.
        run: npx napi build --platform --release --output-dir unitycatalog/codegen --dts native.d.ts --js native.js -- --locked
        working-directory: node/client

      - name: Compile TypeScript
        run: npm run tsc
        working-directory: node/client

      - name: Copy .node artifact to dist
        # `dist/codegen/native.js` resolves the binary via `require("./client.<platform>.node")`,
        # so the artifact must sit next to it under `dist/codegen/`.
        run: cp unitycatalog/codegen/client.linux-x64-gnu.node dist/codegen/client.linux-x64-gnu.node
        working-directory: node/client

      - name: Run unit tests
        run: npm run test
        working-directory: node/client
