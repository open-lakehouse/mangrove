name: node-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  node-unit-tests:
    name: node-unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Guard against a lockfile regenerated behind the internal npm mirror:
      # its `resolved` tarball URLs point at npm-proxy.cloud.databricks.com,
      # which GitHub-hosted runners can't reach (npm ci → ETIMEDOUT). The
      # `integrity` hashes are mirror-independent, so re-point with:
      #   sed -i 's#https://npm-proxy.cloud.databricks.com/#https://registry.npmjs.org/#g' package-lock.json
      - name: Guard package-lock.json against internal mirror URLs
        run: |
          if grep -q 'npm-proxy\.cloud\.databricks\.com' package-lock.json; then
            echo "::error file=package-lock.json::package-lock.json references the internal npm mirror (npm-proxy.cloud.databricks.com), unreachable from CI. Re-point to registry.npmjs.org — see the comment in this step."
            exit 1
          fi

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: node/client

      - name: Build NAPI binding
        # Regenerate the TypeScript declarations (`--dts`) so a stale committed
        # `native.d.ts` cannot silently break `tsc` when the Rust NAPI surface
        # changes; the type definitions are always rebuilt from the binding.
        # Output into the co-located `unitycatalog/codegen/` dir (matching the
        # `build:debug`/`build:release` package scripts) so the generated glue
        # (`native.js`/`native.d.ts`) and binary sit beside `client.ts`.
        run: npx napi build --platform --release --output-dir unitycatalog/codegen --dts native.d.ts --js native.js
        working-directory: node/client

      - name: Compile TypeScript
        run: npm run tsc
        working-directory: node/client

      - name: Copy .node artifact to dist
        # `dist/codegen/native.js` resolves the binary via `require("./client.<platform>.node")`,
        # so the artifact must sit next to it under `dist/codegen/`.
        run: cp unitycatalog/codegen/client.linux-x64-gnu.node dist/codegen/client.linux-x64-gnu.node
        working-directory: node/client

      - name: Run unit tests
        run: npm run test
        working-directory: node/client
