name: dev

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  typos:
    name: spell-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check spelling
        uses: crate-ci/typos@v1

  node-lint:
    name: node-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # bun.lock tarball URLs are generated against whatever registry `bun install`
      # ran against. Databricks dev machines bake the internal mirror host into the
      # lockfile; GitHub runners can't reach it, so rewrite to the public registry
      # here (integrity hashes are unchanged — same tarball content).
      - name: Install dependencies
        run: |
          sed -i 's#https://npm-proxy.cloud.databricks.com/#https://registry.npmjs.org/#g' bun.lock
          bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        working-directory: node/client
