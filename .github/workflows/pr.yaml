name: dev

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Fetch npm packages from the public registry in CI. Local dev resolves through
  # the internal mirror (npm-proxy.cloud.databricks.com) via the developer's own
  # ~/.npmrc, which bakes mirror hosts into package-lock.json `resolved` URLs that
  # GitHub runners can't reach. This env override + npm's default
  # `replace-registry-host=npmjs` rewrites those hosts at fetch time, so CI works
  # without a committed .npmrc (which would break local installs behind the proxy).
  npm_config_registry: https://registry.npmjs.org/

jobs:
  typos:
    name: spell-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check spelling
        uses: crate-ci/typos@v1

  node-lint:
    name: node-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: node/client

      - name: Lint
        run: npm run lint
        working-directory: node/client
