name: PR Title

# Enforce conventional-commit PR titles so the squash-merge commit (and the
# per-crate changelog release-plz derives from it) stays machine-parseable.
# Use a `(scope)` matching the affected crate's short name (common, client,
# sharing-client, object-store, postgres, sqlite, datafusion, server, cli) so
# the bump and changelog land on the right crate. See CONTRIBUTING.md.

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions: {}

jobs:
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
