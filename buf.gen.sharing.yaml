version: v2
managed:
  enabled: true
  disable:
    # Disables all go_package changes for this module only
    - file_option: go_package
      module: buf.build/googleapis/googleapis
plugins:
  # Model generation (buffa runtime) — see buf.gen.yaml for the full rationale.
  # snake_case wire JSON comes from `json_field_names: proto` in
  # trestle.sharing.yaml.
  - remote: buf.build/anthropics/buffa:v0.7.0
    out: crates/sharing-client/src/models/_gen
    opt:
      - json=true
      - file_per_package=true
  - remote: buf.build/bufbuild/es:v2.12.1
    out: node/client/unitycatalog/codegen/models/gen
    opt:
      - target=ts
      - json_types=false
