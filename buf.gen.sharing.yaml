version: v2
managed:
  enabled: true
  disable:
    # Disables all go_package changes for this module only
    - file_option: go_package
      module: buf.build/googleapis/googleapis
plugins:
  # Model generation (buffa runtime) — see buf.gen.yaml for the rationale behind
  # replacing the prost + prost-serde plugin stack with the single buffa plugin.
  - remote: buf.build/anthropics/buffa:v0.7.0
    out: crates/sharing-client/src/models/gen
    opt:
      - json=true
      # Flat `<package>.rs` layout — see buf.gen.yaml.
      - file_per_package=true
  - remote: buf.build/bufbuild/es:v2.12.1
    out: node/client/unitycatalog/models/gen
    opt:
      - target=ts
      - json_types=false
