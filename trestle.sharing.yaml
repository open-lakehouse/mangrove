# Trestle codegen config for the Open Sharing proto module.
#
# The sharing protocol is served from the `unitycatalog-sharing-client` crate
# (models + client + co-located axum extractors) and the `unitycatalog-server`
# crate (handler traits & axum routes), separately from the resource-oriented
# Unity Catalog surface (see `trestle.yaml`). Sharing services are RPC-style
# (non-resource), so the resource-specific features stay off.
#
# `buf.gen.sharing.yaml` is hand-maintained separately (mangrove runs
# `buf generate` directly).
version: 1
project:
  name: unitycatalog-sharing
generate:
  proto_lib: buffa
  # snake_case JSON field names on the wire (see trestle.yaml for rationale).
  # Must flip together with `proto_lib: buffa` — trestle rejects
  # `json_field_names: proto` under prost.
  json_field_names: proto
  descriptors: sharing-descriptors.bin

  servers:
    rest: true

  clients:
    rust:
      output: crates/sharing-client/src

  models:
    dir: crates/sharing-client/src/models
    crate_name: unitycatalog_sharing_client

  server:
    output: crates/server/src/sharing
    context_type: crate::api::RequestContext
    error_type_path: crate::Error
    resource_enum: false
    store_integration: false
    object_conversions: false
    resource_clients: false
