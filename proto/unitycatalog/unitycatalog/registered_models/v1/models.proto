syntax = "proto3";

package unitycatalog.registered_models.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

// The payload for creating a new registered model.
//
// Wrapped in the `model_info` envelope of a `CreateRegisteredModelRequest`,
// matching the Unity Catalog `POST /models` wire contract.
message CreateRegisteredModel {
  // Name of registered model, relative to parent schema.
  string name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent catalog.
  string catalog_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent schema.
  string schema_name = 3 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // User-provided free-form text description.
  optional string comment = 4 [(google.api.field_behavior) = OPTIONAL];
}

// A registered model within the three-level namespace (catalog.schema.model).
//
// Registered models group a collection of model versions. Individual versions
// carry their own artifact storage location and are created, finalized, and
// governed independently.
message RegisteredModel {
  option (google.api.resource) = {
    type: "unitycatalog.io/RegisteredModel"
    pattern: "models/{registered_model}"
    plural: "registered_models"
    singular: "registered_model"
    name_field: "full_name"
  };

  // Name of registered model, relative to parent schema.
  string name = 1 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent catalog.
  string catalog_name = 2 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // Name of parent schema.
  string schema_name = 3 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]$",
    (buf.validate.field).string.min_len = 3,
    (google.api.field_behavior) = REQUIRED
  ];

  // The three-level (fully qualified) name of the registered model.
  //
  // Format: catalog_name.schema_name.model_name
  string full_name = 4 [
    (buf.validate.field).string.pattern = "^[a-z][0-9a-z_]*[0-9a-z]\\.[a-z][0-9a-z_]*[0-9a-z]\\.[a-z][0-9a-z_]*[0-9a-z]$",
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // The storage location under which model version data files are stored.
  optional string storage_location = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Username of current owner of the registered model.
  optional string owner = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // User-provided free-form text description.
  optional string comment = 7 [(google.api.field_behavior) = OPTIONAL];

  // Unique identifier for the registered model.
  optional string id = 8 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // Time at which this registered model was created, in epoch milliseconds.
  optional int64 created_at = 1000 [
    (buf.validate.field).int64.gt = 0,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Username of registered model creator.
  optional string created_by = 1001 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Time at which this registered model was last updated, in epoch milliseconds.
  optional int64 updated_at = 1002 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Username of user who last modified the registered model.
  optional string updated_by = 1003 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The unique identifier of the metastore.
  optional string metastore_id = 1004 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Indicates whether the principal is limited to retrieving metadata for the
  // associated object through the BROWSE privilege when include_browse is
  // enabled in the request.
  optional bool browse_only = 1005 [(google.api.field_behavior) = OUTPUT_ONLY];
}
