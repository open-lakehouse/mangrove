syntax = "proto3";

package unitycatalog.policies.v1;

import "buf/validate/validate.proto";
import "gnostic/openapi/v3/annotations.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "unitycatalog/policies/v1/models.proto";

// List policies defined on a securable.
message ListPoliciesRequest {
  // The type of the securable to list policies on.
  //
  // Supported values: catalogs, schemas, tables.
  string on_securable_type = 1 [
    (buf.validate.field).string.pattern = "^(catalogs|schemas|tables)$",
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The fully qualified name of the securable to list policies on.
  string on_securable_fullname = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // When true, also return policies defined on the securable's ancestors
  // (e.g. for a table: its schema and catalog). Each returned PolicyInfo still
  // carries its own on_securable_type / on_securable_fullname, so callers can see
  // where it was defined.
  optional bool include_inherited = 3 [(google.api.field_behavior) = OPTIONAL];

  // The maximum number of results per page that should be returned.
  optional int32 max_results = 4 [
    (buf.validate.field).int32 = {
      gt: 0
      lte: 1000
    },
    (google.api.field_behavior) = OPTIONAL
  ];

  // Opaque pagination token to go to next page based on previous query.
  optional string page_token = 5 [(google.api.field_behavior) = OPTIONAL];
}

// List policies response.
message ListPoliciesResponse {
  // The policies returned.
  repeated PolicyInfo policies = 1;

  // The next_page_token value to include in the next List request.
  optional string next_page_token = 2;
}

// Create a new policy on a securable.
message CreatePolicyRequest {
  // The type of the securable to create the policy on.
  //
  // Supported values: catalogs, schemas, tables.
  string on_securable_type = 1 [
    (buf.validate.field).string.pattern = "^(catalogs|schemas|tables)$",
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The fully qualified name of the securable to create the policy on.
  string on_securable_fullname = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The policy to create.
  PolicyInfo policy_info = 3 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
}

// Get a policy defined on a securable.
message GetPolicyRequest {
  // The type of the securable the policy is defined on.
  //
  // Supported values: catalogs, schemas, tables.
  string on_securable_type = 1 [
    (buf.validate.field).string.pattern = "^(catalogs|schemas|tables)$",
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The fully qualified name of the securable the policy is defined on.
  string on_securable_fullname = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The name of the policy.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
}

// Update a policy defined on a securable.
message UpdatePolicyRequest {
  // The type of the securable the policy is defined on.
  //
  // Supported values: catalogs, schemas, tables.
  string on_securable_type = 1 [
    (buf.validate.field).string.pattern = "^(catalogs|schemas|tables)$",
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The fully qualified name of the securable the policy is defined on.
  string on_securable_fullname = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The name of the policy to update.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The policy with the updated fields.
  PolicyInfo policy_info = 4 [
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The list of fields to update, as a comma-separated string.
  optional string update_mask = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Delete a policy defined on a securable.
message DeletePolicyRequest {
  // The type of the securable the policy is defined on.
  //
  // Supported values: catalogs, schemas, tables.
  string on_securable_type = 1 [
    (buf.validate.field).string.pattern = "^(catalogs|schemas|tables)$",
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The fully qualified name of the securable the policy is defined on.
  string on_securable_fullname = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];

  // The name of the policy to delete.
  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).required = true,
    (google.api.field_behavior) = REQUIRED
  ];
}

// Manage ABAC row-filter and column-mask policies bound to Unity Catalog securables.
service PoliciesService {
  // List policies
  //
  // Gets an array of policies defined on the specified securable. There is no guarantee
  // of a specific ordering of the elements in the array.
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse) {
    option (google.api.http) = {get: "/policies/{on_securable_type}/{on_securable_fullname}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "ListPolicies"};
  }

  // Create a new policy
  //
  // Creates a new row-filter or column-mask policy on the specified securable.
  rpc CreatePolicy(CreatePolicyRequest) returns (PolicyInfo) {
    option (google.api.http) = {
      post: "/policies/{on_securable_type}/{on_securable_fullname}"
      body: "policy_info"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "CreatePolicy"};
  }

  // Get a policy
  //
  // Gets the policy that matches the supplied name, defined on the specified securable.
  rpc GetPolicy(GetPolicyRequest) returns (PolicyInfo) {
    option (google.api.http) = {get: "/policies/{on_securable_type}/{on_securable_fullname}/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "GetPolicy"};
  }

  // Update a policy
  //
  // Updates the policy that matches the supplied name, defined on the specified securable.
  rpc UpdatePolicy(UpdatePolicyRequest) returns (PolicyInfo) {
    option (google.api.http) = {
      patch: "/policies/{on_securable_type}/{on_securable_fullname}/{name}"
      body: "*"
    };
    option (gnostic.openapi.v3.operation) = {operation_id: "UpdatePolicy"};
  }

  // Delete a policy
  //
  // Deletes the policy that matches the supplied name, defined on the specified securable.
  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/policies/{on_securable_type}/{on_securable_fullname}/{name}"};
    option (gnostic.openapi.v3.operation) = {operation_id: "DeletePolicy"};
  }
}
